plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.plugins'
    compileSdk rootProject.compileSdkVersion
    defaultConfig {
        applicationId "com.example.plugins"
        minSdk 14
        targetSdk rootProject.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation project(':basslib')
}
